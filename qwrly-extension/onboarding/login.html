<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWRLY — Sign in</title>
    <link rel="icon" href="../icons/icon128.png">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(20, 21, 26, 0.55);
            --text-primary: #ffffff;
            --text-secondary: #8a8d98;
            --input-bg: rgba(33, 35, 41, 0.7);
            --accent-blue: #00f0ff;
            --accent-pink: #ff0055;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-animation-container {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; opacity: 0.6;
        }

        .tilted-bars-wrapper {
            position: relative; width: 1200px; height: 1200px;
            transform: rotate(-45deg); display: flex; flex-direction: column; gap: 40px;
        }

        .bar-track {
            position: relative; width: 200%; height: 45px;
            background: linear-gradient(90deg, rgba(20,20,25,0.8) 0%, rgba(40,42,50,0.5) 50%, rgba(20,20,25,0.8) 100%);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .bar-track::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 0, 85, 0.2) 30%, var(--accent-pink) 40%, var(--accent-blue) 60%, rgba(0, 240, 255, 0.2) 70%, transparent 100%);
            filter: blur(4px);
            animation: moveUpShiny 6s linear infinite;
        }

        .bar-track:nth-child(2)::after { animation-delay: -1.5s; animation-duration: 5s; }
        .bar-track:nth-child(3)::after { animation-delay: -3s; animation-duration: 7s; }
        .bar-track:nth-child(4)::after { animation-delay: -4.5s; animation-duration: 5.5s; }

        @keyframes moveUpShiny { 0% { left: -100%; } 100% { left: 100%; } }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(5, 5, 8, 0.9) 90%);
            z-index: 2; pointer-events: none;
        }

        .login-container {
            position: relative; z-index: 10; width: 440px; padding: 50px 45px;
            background: var(--card-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            clip-path: polygon(0% 0%, 93% 0%, 100% 7%, 100% 100%, 7% 100%, 0% 93%);
        }

        .login-container::before {
            content: ''; position: absolute; top: 25px; left: -2px; width: 4px; height: 80px;
            background: linear-gradient(to bottom, var(--accent-blue), transparent); border-radius: 2px;
        }

        .login-container::after {
            content: ''; position: absolute; bottom: -2px; right: 40px; width: 60px; height: 4px;
            background: linear-gradient(to left, var(--accent-pink), transparent); border-radius: 2px;
        }

        .brand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .brand-row img { width: 40px; height: 40px; border-radius: 10px; }
        .brand-row span { font-size: 20px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }

        .header-section { margin-bottom: 35px; }
        .header-section h1 { color: var(--text-primary); font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px; }
        .header-section p { color: var(--text-secondary); font-size: 13px; line-height: 1.5; }

        .oauth-wrapper { display: flex; gap: 12px; margin-bottom: 30px; }

        .oauth-btn {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color);
            border-radius: 50px; padding: 12px; color: var(--text-primary);
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.25s ease;
        }

        .oauth-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        .oauth-btn svg { width: 18px; height: 18px; }

        .divider {
            display: flex; align-items: center; text-align: center; color: rgba(255, 255, 255, 0.15);
            font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 30px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .form-group { margin-bottom: 22px; position: relative; }
        .form-group label { display: block; color: var(--text-secondary); font-size: 12px; font-weight: 500; margin-bottom: 8px; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }

        .form-group input {
            width: 100%; background: var(--input-bg); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px; padding: 14px 16px; color: var(--text-primary); font-size: 14px; outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus { border-color: rgba(0, 240, 255, 0.4); background: rgba(33, 35, 41, 0.9); box-shadow: 0 0 15px rgba(0, 240, 255, 0.1); }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.25); }

        .password-toggle {
            position: absolute; right: 16px; background: none; border: none; color: rgba(255, 255, 255, 0.3);
            cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
        }
        .password-toggle:hover { color: var(--text-primary); }

        .submit-btn {
            width: 100%; background: #ffffff; color: #000000; border: none; border-radius: 50px; padding: 15px;
            font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
        }
        .submit-btn:hover { background: #f0f0f0; transform: scale(1.01); box-shadow: 0 4px 25px rgba(255, 255, 255, 0.3); }
        .submit-btn:active { transform: scale(0.99); }

        .skip-note { text-align: center; margin-top: 18px; font-size: 12px; color: var(--text-secondary); }
        .skip-note a { color: var(--accent-blue); text-decoration: none; }

        .decor-grid-left { position: absolute; left: -25px; top: 20%; display: flex; flex-direction: column; gap: 8px; }
        .decor-block { width: 12px; height: 24px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); transform: skewY(-15deg); }
    </style>
</head>
<body>

    <div class="bg-animation-container">
        <div class="tilted-bars-wrapper">
            <div class="bar-track"></div>
            <div class="bar-track"></div>
            <div class="bar-track"></div>
            <div class="bar-track"></div>
            <div class="bar-track"></div>
            <div class="bar-track"></div>
        </div>
    </div>

    <div class="vignette"></div>

    <div class="login-container">
        <div class="decor-grid-left">
            <div class="decor-block"></div>
            <div class="decor-block"></div>
            <div class="decor-block"></div>
            <div class="decor-block"></div>
        </div>

        <div class="brand-row">
            <img src="../icons/icon128.png" alt="QWRLY">
            <span>QWRLY</span>
        </div>

        <div class="header-section">
            <h1>Welcome to QWRLY</h1>
            <p>Sign in to connect Gmail scanning, Twilio SMS forwarding, and voice-based incident reporting to your account.</p>
        </div>

        <div class="oauth-wrapper">
            <button class="oauth-btn" type="button" id="googleOauthBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                Google
            </button>
        </div>

        <div class="divider">Or secure login</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="submit-btn">Continue to dashboard</button>
        </form>

        <p class="skip-note"><a href="../dashboard/dashboard.html" id="skipLink">Skip for now — configure everything later in Settings</a></p>
    </div>

    <script src="login.js"></script>
</body>
</html>
